name: Build WDA for AltStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & xcuitest-driver
        run: |
          npm install -g appium
          appium driver install xcuitest

      - name: Build Unsigned WDA
        run: |
          # 自動定位 xcuitest-driver 內部的 WDA 路徑
          WDA_PATH=$(dirname $(find $(npm root -g) -name "WebDriverAgent.xcodeproj"))
          echo "WDA Path Found: $WDA_PATH"
          cd "$WDA_PATH"
          
          # 核心改動：強制停用 Code Signing
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY=""

          # 準備 Payload 資料夾以封裝 IPA
          mkdir -p $GITHUB_WORKSPACE/output/Payload
          
          # 尋找編譯出的 .app 檔案路徑
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "App found at: $APP_PATH"
          
          # 複製到 Payload 並壓縮
          cp -R "$APP_PATH" $GITHUB_WORKSPACE/output/Payload/
          cd $GITHUB_WORKSPACE/output
          zip -r WebDriverAgent.ipa Payload

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: WDA-for-AltStore
          path: output/WebDriverAgent.ipa
